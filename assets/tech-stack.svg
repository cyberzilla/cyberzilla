              <span class="repo-name">czelectro</span>
              
            </div>
            <div class="repo-desc">A web-based circuit simulation tool with drag-and-drop components, flexible wire routing, and a r...</div>
            <div class="repo-footer">
              <div class="repo-meta">
                <span class="meta-item"><span class="lang-dot" style="background: #f1e05a;"></span> JavaScript</span>
                <span class="meta-item">&#x2B50; 1</span>
                <span class="meta-item">&#x1F374; 0</span>
                <span class="meta-item">&#x1F4DC; MIT</span>
              </div>
              <span class="repo-date">May 25</span>
            </div>
          </div>

