<svg width="900" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .footer {
          width: 900px;
          height: 120px;
          background: linear-gradient(180deg, transparent 0%, #0d1117 30%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          position: relative;
          overflow: hidden;
        }

        .divider {
          width: 200px;
          height: 1px;
          background: linear-gradient(90deg, transparent, rgba(0,255,136,0.3), rgba(0,170,255,0.3), rgba(138,43,226,0.3), transparent);
          margin-bottom: 16px;
          animation: shimmer 3s linear infinite;
          background-size: 200% 100%;
        }
        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }

        .quote {
          font-size: 13px;
          color: rgba(200, 220, 255, 0.35);
          font-style: italic;
          letter-spacing: 1px;
          text-align: center;
          animation: fadeIn 2s ease forwards;
        }
        @keyframes fadeIn {
          0% { opacity: 0; }
          100% { opacity: 1; }
        }

        .quote-highlight {
          color: #00ff88;
          font-weight: 600;
          font-style: normal;
        }

        .visitor-line {
          margin-top: 12px;
          font-size: 10px;
          color: rgba(200, 220, 255, 0.2);
          letter-spacing: 3px;
          text-transform: uppercase;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .heartbeat {
          display: inline-block;
          color: #ff4757;
          animation: heartPump 1.5s ease-in-out infinite;
        }
        @keyframes heartPump {
          0%, 100% { transform: scale(1); }
          15% { transform: scale(1.3); }
          30% { transform: scale(1); }
          45% { transform: scale(1.2); }
        }

        .wave-bg {
          position: absolute;
          bottom: 0;
          left: 0;
          width: 100%;
          height: 40px;
          background: linear-gradient(180deg, transparent, rgba(0,255,136,0.02));
        }
      </style>

      <div class="footer">
        <div class="wave-bg"></div>
        <div class="divider"></div>
        <div class="quote">
          "<span class="quote-highlight">Code</span> is like humor. When you have to explain it, it's bad."
        </div>
        <div class="visitor-line">
          Made with <span class="heartbeat">&#x2764;&#xFE0F;</span> and lots of &#x2615;
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
